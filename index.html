<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地雷競技場 - 創房與對戰系統</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: #eee; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        
        /* 大廳介面升級 */
        #lobby-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .lobby-box { background: #333; padding: 40px; border-radius: 15px; text-align: center; box-shadow: 0 0 30px #000; border: 1px solid #444; width: 350px; }
        
        .input-group { margin: 20px 0; }
        input { padding: 12px; font-size: 18px; border-radius: 5px; border: 1px solid #555; width: 80%; text-align: center; background: #222; color: white; margin-bottom: 10px; }
        
        .btn-stack { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        button { padding: 12px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; transition: 0.2s; width: 100%; }
        
        .create-btn { background: #00d4ff; color: #000; } /* 創房按鈕 */
        .join-btn { background: #2ecc71; color: white; } /* 加入按鈕 */
        .solo-btn { background: #636e72; color: white; } /* 單人按鈕 */
        button:hover { opacity: 0.8; transform: translateY(-2px); }

        /* 遊戲畫面 */
        .status-panel { background: #2c2c2c; padding: 20px; border-radius: 10px; margin-bottom: 20px; width: 320px; border-left: 5px solid #00d4ff; position: relative; }
        #mode-tag { position: absolute; top: 5px; right: 10px; font-size: 10px; color: #888; text-transform: uppercase; }
        .opp-progress-container { width: 100%; background: #444; height: 8px; border-radius: 4px; margin-top: 10px; overflow: hidden; }
        #opp-bar { width: 0%; height: 100%; background: #00d4ff; transition: width 0.5s; }

        #grid { display: grid; grid-template-columns: repeat(10, 32px); gap: 2px; background: #444; padding: 5px; border: 4px solid #555; }
        .cell { width: 32px; height: 32px; background: #bbb; border: 3px outset #eee; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; color: #333; user-select: none; }
        .cell.revealed { background: #ddd; border: 1px solid #999; cursor: default; }
        .cell.mine { background: #ff4757; }
        .cell.flag { color: #ff4757; }

        #result-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: #333; padding: 30px; border-radius: 12px; box-shadow: 0 0 50px rgba(0,0,0,0.5); z-index: 100; text-align: center; }
    </style>
</head>
<body>

    <!-- 大廳介面 -->
    <div id="lobby-overlay">
        <div class="lobby-box">
            <h2 style="margin-top:0;">Minesweeper</h2>
            
            <div class="input-group">
                <input type="text" id="room-input" placeholder="輸入或生成房號">
            </div>

            <div class="btn-stack">
                <button class="create-btn" onclick="createRoom()">✨ 創建新房間</button>
                <button class="join-btn" onclick="joinRoom()">🤝 加入指定房間</button>
                <hr style="width:100%; border:0; border-top:1px solid #555; margin:10px 0;">
                <button class="solo-btn" onclick="startSolo()">🧘 單人練習模式</button>
            </div>
            
            <p id="lobby-msg" style="color:#00d4ff; font-size: 14px; margin-top: 20px; min-height: 1.2em;"></p>
        </div>
    </div>

    <h1>MINESWEEPER</h1>

    <div class="status-panel">
        <div id="mode-tag">READY</div>
        <div id="message">🏁 請在大廳選擇模式</div>
        <div id="timer">時間: 0.00s</div>
        <div id="opp-ui">
            <div id="opp-text">對手進度: 0%</div>
            <div class="opp-progress-container"><div id="opp-bar"></div></div>
        </div>
    </div>

    <div id="grid"></div>

    <div id="result-modal">
        <h2 id="final-title">GAME OVER</h2>
        <div id="final-details"></div>
        <button onclick="location.reload()" style="margin-top:20px; padding:10px 20px; cursor:pointer;">返回主選單</button>
    </div>

    <script>
        // 連線設定 (請確保 server.js 已啟動)
        const socket = io('http://localhost:3000', { reconnection: false });
        
        const size = 10, mineCount = 15;
        let cells = [], gameActive = false, isFirstClick = true;
        let isSoloMode = false, startTime, timerInterval, opponentResult = null;

        function initGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            cells = [];
            for (let i = 0; i < size * size; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.addEventListener('click', () => handleCellClick(i));
                cell.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    if (!gameActive || cell.classList.contains('revealed')) return;
                    cell.classList.toggle('flag');
                    cell.innerText = cell.classList.contains('flag') ? "🚩" : "";
                });
                grid.appendChild(cell);
                cells.push(cell);
            }
        }

        // --- 房號管理功能 ---

        // 1. 創房：自動生成房號並加入
        function createRoom() {
            const randomCode = Math.floor(1000 + Math.random() * 9000).toString(); // 生成 1000-9999
            document.getElementById('room-input').value = randomCode;
            joinRoom(); // 自動執行加入邏輯
            document.getElementById('lobby-msg').innerHTML = `房間已建立！<br>請告知好友房號：<strong style="font-size:20px;">${randomCode}</strong>`;
        }

        // 2. 加入：直接使用輸入框的號碼
        function joinRoom() {
            const code = document.getElementById('room-input').value;
            if (!code) return alert("請輸入房號或點擊創建！");
            isSoloMode = false;
            socket.emit('join_room', code);
            if(document.getElementById('lobby-msg').innerText === "") {
                document.getElementById('lobby-msg').innerText = "正在進入房間，等待對手...";
            }
        }

        function startSolo() {
            isSoloMode = true;
            document.getElementById('lobby-overlay').style.display = 'none';
            document.getElementById('opp-ui').style.opacity = '0.2';
            document.getElementById('mode-tag').innerText = "Solo Mode";
            document.getElementById('message').innerText = "練習模式：點擊任何一格開始";
            gameActive = true; 
            initGrid();
        }

        // --- Socket 通訊 ---
        socket.on('start_race', (data) => {
            document.getElementById('lobby-overlay').style.display = 'none';
            document.getElementById('mode-tag').innerText = "PvP Match";
            gameActive = true;
            initGrid();
            startTimer(data.startTime);
        });

        socket.on('opponent_progress', (percent) => {
            document.getElementById('opp-bar').style.width = percent + "%";
            document.getElementById('opp-text').innerText = `對手進度: ${percent}%`;
        });

        socket.on('opponent_finished', (data) => {
            opponentResult = data;
            if (data.result === 'lose') document.getElementById('message').innerText = "⚠️ 對手踩雷了！請謹慎完成剩餘格子！";
        });

        // --- 遊戲核心邏輯 ---
        function handleCellClick(index) {
            if (!gameActive || cells[index].classList.contains('flag')) return;

            if (isFirstClick) {
                if (isSoloMode) startTimer(Date.now());
                generateMinesExcluding(index);
                isFirstClick = false;
                if (!isSoloMode) startReporting();
            }

            if (cells[index].dataset.mine === "true") {
                endGame('lose');
            } else {
                reveal(index);
                checkWin();
            }
        }

        function startTimer(sTime) {
            startTime = sTime;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                let diff = (Date.now() - startTime) / 1000;
                document.getElementById('timer').innerText = `時間: ${diff.toFixed(2)}s`;
            }, 100);
        }

        function generateMinesExcluding(safeIndex) {
            let positions = Array.from({length: size * size}, (_, i) => i).filter(i => i !== safeIndex);
            let mines = positions.sort(() => Math.random() - 0.5).slice(0, mineCount);
            cells.forEach((c, i) => c.dataset.mine = mines.includes(i));
        }

        function reveal(index) {
            const cell = cells[index];
            if (cell.classList.contains('revealed')) return;
            cell.classList.add('revealed');
            let mines = getNeighbors(index).filter(n => cells[n].dataset.mine === "true").length;
            if (mines > 0) {
                cell.innerText = mines;
                cell.style.color = ["", "#0984e3", "#00b894", "#d63031", "#2d3436", "#636e72", "#e17055", "#b2bec3"][mines];
            } else {
                getNeighbors(index).forEach(n => reveal(n));
            }
        }

        function getNeighbors(index) {
            let res = [], r = Math.floor(index/size), c = index%size;
            for(let i=-1; i<=1; i++) for(let j=-1; j<=1; j++) {
                let nr = r+i, nc = c+j;
                if(nr>=0 && nr<size && nc>=0 && nc<size) res.push(nr*size+nc);
            }
            return res;
        }

        function startReporting() {
            setInterval(() => {
                if (!gameActive) return;
                let revealed = cells.filter(c => c.classList.contains('revealed')).length;
                let percent = Math.floor((revealed / (size * size - mineCount)) * 100);
                socket.emit('update_progress', percent);
            }, 5000);
        }

        function checkWin() {
            let safeLeft = cells.filter(c => !c.classList.contains('revealed') && c.dataset.mine === "false").length;
            if (safeLeft === 0) endGame('win');
        }

        function endGame(result) {
            gameActive = false;
            clearInterval(timerInterval);
            let myTime = ((Date.now() - startTime) / 1000).toFixed(2);
            if (!isSoloMode) socket.emit('game_finished', { result, time: myTime });

            document.getElementById('result-modal').style.display = 'block';
            document.getElementById('final-title').innerText = result === 'win' ? "🏆 贏得比賽" : "💀 踩到地雷";
            
            let oppInfo = isSoloMode ? "練習模式無對手" : (opponentResult ? `${opponentResult.result === 'win' ? '成功' : '失敗'} (${opponentResult.time}s)` : "還在奮戰中");
            document.getElementById('final-details').innerHTML = `你的用時: ${myTime}s<br>對手狀況: ${oppInfo}`;
        }

        initGrid();
    </script>
</body>
</html>
